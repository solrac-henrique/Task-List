<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Tarefas | Carlos Henrique</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body class="body">

  <main class="corpo">
    <div class="titulo">
      <h1>Lista de Tarefas</h1>
    </div>

    <div class="container">
      <input class="input" id="input-tarefa" type="text" placeholder="Adicione suas tarefas aqui...">
      <button class="botao" id="botao-adicionar">Adicionar</button>
      <p class="mensagem" id="mensagem"></p>

      <p id="contador" class="contador">0 tarefa(s) pendente(s)</p>

      <div class="filtros">
        <button class="filtro-btn ativo" data-filtro="todas">Todas</button>
        <button class="filtro-btn" data-filtro="pendentes">Pendentes</button>
        <button class="filtro-btn" data-filtro="concluidas">Concluídas</button>
      </div>

      <!-- MONITOR RETRO -->
      <ul class="listaTarefa" id="lista-tarefas"></ul>
    </div>
  </main>

  <footer class="footer">
    <a href="https://github.com/solrac-henrique">Made by Carlos Henrique Martins</a>
  </footer>

  <script src="script.js"></script>
</body>
</html>
